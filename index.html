<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Super Simple Songs 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFD700;
  --yellow-dark: #F5A800;
  --red: #FF5A5A;
  --orange: #FF9F43;
  --green: #4CAF7D;
  --blue: #4D96FF;
  --purple: #B57BFF;
  --pink: #FF6B9D;
  --teal: #26C6DA;
  --bg: #FFFDF5;
  --card-bg: #FFFFFF;
  --text: #1A1A2E;
  --text-muted: #9999AA;
  --border: #F0EDE6;
  --shadow: 0 4px 24px rgba(0,0,0,0.07);
  --shadow-hover: 0 12px 40px rgba(0,0,0,0.13);
  --radius: 20px;
  --max-width: 1200px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
.site-header { background: var(--yellow); border-bottom: 3px solid var(--yellow-dark); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(245,168,0,0.25); }
.header-inner { max-width: var(--max-width); margin: 0 auto; padding: 18px 32px 14px; }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-icon { width: 52px; height: 52px; background: rgba(255,255,255,0.45); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 2px solid rgba(255,255,255,0.6); flex-shrink: 0; }
.brand-name { font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; color: #7A3800; line-height: 1; }
.brand-tagline { font-size: 12px; font-weight: 700; color: #9A5500; margin-top: 2px; }
.song-count-badge { background: rgba(255,255,255,0.4); border: 2px solid rgba(255,255,255,0.6); border-radius: 12px; padding: 6px 14px; font-size: 13px; font-weight: 800; color: #7A3800; white-space: nowrap; }

.search-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
.search-input { width: 100%; padding: 11px 16px 11px 40px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.7); font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 700; background: #fff; color: var(--text); outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--yellow-dark); }

.filter-select { padding: 11px 14px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.7); font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 700; background: #fff; color: #555; cursor: pointer; }
.search-btn { padding: 11px 20px; border-radius: 14px; border: none; font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 900; background: #FF0000; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 14px rgba(255,0,0,0.3); transition: transform 0.15s; white-space: nowrap; }
.search-btn:active { transform: scale(0.96); }

/* PAGE */
.page { max-width: var(--max-width); margin: 0 auto; padding: 28px 32px 48px; }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; color: var(--text); }
.results-count { font-size: 14px; font-weight: 700; color: var(--text-muted); }

.load-more-wrap { text-align: center; margin-top: 32px; }
.load-more-btn { padding: 12px 32px; border-radius: 14px; border: 2px solid var(--yellow-dark); font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 800; background: #fff; color: var(--yellow-dark); cursor: pointer; transition: all 0.2s; }
.load-more-btn:hover { background: var(--yellow); border-color: var(--yellow); color: #7A3800; }

/* SONG GRID */
.song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

.song-card { border-radius: var(--radius); overflow: hidden; cursor: pointer; background: var(--card-bg); box-shadow: var(--shadow); border: 2px solid var(--border); transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative; }
.song-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
.song-card:active { transform: scale(0.96); }

.card-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #1a1a2e; }
.card-thumb { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
.song-card:hover .card-thumb { transform: scale(1.05); }
.play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.song-card:hover .play-overlay { background: rgba(0,0,0,0.3); }
.play-btn { width: 48px; height: 48px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; opacity: 0; transform: scale(0.8); transition: all 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.song-card:hover .play-btn { opacity: 1; transform: scale(1); }

.card-body { padding: 12px 14px 14px; }
.card-channel { font-size: 11px; font-weight: 800; color: var(--red); margin-bottom: 5px; }
.card-title { font-size: 14px; font-weight: 800; line-height: 1.35; color: var(--text); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; gap: 10px; align-items: center; }
.card-views { font-size: 12px; font-weight: 600; color: var(--text-muted); }
.card-date { font-size: 12px; font-weight: 600; color: var(--text-muted); }

/* STATES */
.loading-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
.spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #F0EDE6; border-top-color: var(--yellow-dark); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 17px; font-weight: 700; color: var(--text-muted); }
.empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
.empty-emoji { font-size: 60px; margin-bottom: 16px; }
.empty-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
.empty-sub { font-size: 15px; color: var(--text-muted); font-weight: 600; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,20,0.7); backdrop-filter: blur(8px); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--card-bg); border-radius: 28px; width: 100%; max-width: 1000px; max-height: 92vh; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
.modal-header { padding: 18px 22px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; background: linear-gradient(135deg, #FF5A5A, #FF9F43); }
.modal-title { font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 800; color: #fff; flex: 1; line-height: 1.3; text-shadow: 0 1px 4px rgba(0,0,0,0.2); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.modal-close { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.4); color: #fff; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; }
.modal-body { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
.modal-video { width: 100%; aspect-ratio: 16/9; background: #0a0a14; flex-shrink: 0; }
.modal-video iframe { width: 100%; height: 100%; border: none; display: block; }
.modal-lyrics { flex: 1; overflow-y: auto; padding: 24px 28px; background: #FFFDF5; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.lyrics-note { text-align: center; }
.lyrics-note-emoji { font-size: 52px; margin-bottom: 16px; }
.lyrics-note-title { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
.lyrics-note-sub { font-size: 15px; color: var(--text-muted); font-weight: 600; line-height: 1.6; }

.modal-lyrics::-webkit-scrollbar { width: 5px; }
.modal-lyrics::-webkit-scrollbar-thumb { background: #E0DDD6; border-radius: 10px; }

@media (min-width: 720px) {
  .modal-body { flex-direction: row; }
  .modal-video { width: 60%; aspect-ratio: auto; }
  .modal-lyrics { width: 40%; }
}

@media (max-width: 600px) {
  .header-inner { padding: 14px 16px 12px; }
  .page { padding: 20px 16px 40px; }
  .song-count-badge { display: none; }
  .song-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .brand-name { font-size: 20px; }
}

@media (max-width: 400px) {
  .song-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="brand">
        <img id="channelLogo" src="" alt="Super Simple Songs" style="width:52px;height:52px;border-radius:16px;object-fit:cover;border:2px solid rgba(255,255,255,0.6);flex-shrink:0;display:none;" onerror="this.style.display='none';document.getElementById('fallbackIcon').style.display='flex';" />
        <div class="brand-icon" id="fallbackIcon">🎵</div>
        <div>
          <div class="brand-name">Super Simple Songs</div>
          <div class="brand-tagline">Kids songs & nursery rhymes 🌈</div>
        </div>
      </div>
      <div class="song-count-badge" id="songCountBadge">Loading songs...</div>
    </div>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search any Super Simple Song..." />
      </div>
      <select class="filter-select" id="orderFilter">
        <option value="date">Newest First</option>
        <option value="viewCount">Most Viewed</option>
        <option value="relevance">Relevance</option>
        <option value="rating">Top Rated</option>
      </select>
      <button class="search-btn" id="searchBtn">▶ Search</button>
    </div>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <div class="page-title" id="pageTitle">🎵 Latest Songs</div>
    <div class="results-count" id="resultsCount"></div>
  </div>
  <div class="song-grid" id="songGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">Load More Songs ▼</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header" id="modalHeader">
      <div class="modal-title" id="modalTitle">Song Title</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-video">
        <iframe id="videoFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
      <div class="modal-lyrics">
        <div class="lyrics-note">
          <div class="lyrics-note-emoji">🎤</div>
          <div class="lyrics-note-title">Sing Along!</div>
          <div class="lyrics-note-sub">Watch the video and follow<br>the lyrics on screen 🌈<br><br>Your daughter will love it! 🎵</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const YT_API_KEY     = "AIzaSyBNEhmX7ztsjMFMrL4V6RKub6no8P8X2kM";
const SSS_CHANNEL_ID = "UCLsooMJoIpl_7ux2jvdPB-Q";
const ACCENT_COLORS  = ["#FF5A5A","#FF9F43","#FFD700","#4CAF7D","#4D96FF","#B57BFF","#FF6B9D","#26C6DA"];

// ── LOAD CHANNEL LOGO ──
async function loadChannelLogo() {
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${SSS_CHANNEL_ID}&key=${YT_API_KEY}`);
    const data = await res.json();
    const logo = data.items?.[0]?.snippet?.thumbnails?.medium?.url || data.items?.[0]?.snippet?.thumbnails?.default?.url;
    if (logo) {
      const img = document.getElementById("channelLogo");
      img.src = logo;
      img.style.display = "block";
      document.getElementById("fallbackIcon").style.display = "none";
    }
  } catch(e) { /* fallback emoji stays */ }
}

let nextPageToken = null;
let currentQuery  = "";
let currentOrder  = "date";
let totalLoaded   = 0;

// ── FORMAT HELPERS ──
function formatViews(n) {
  n = parseInt(n);
  if (isNaN(n)) return '';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B views';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M views';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K views';
  return n + ' views';
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 86400)    return 'Today';
  if (diff < 2592000)  return Math.floor(diff/86400) + 'd ago';
  if (diff < 31536000) return Math.floor(diff/2592000) + 'mo ago';
  return Math.floor(diff/31536000) + 'y ago';
}

// ── FETCH FROM YOUTUBE API ──
async function fetchVideos(query, order, pageToken, append) {
  const grid = document.getElementById("songGrid");

  if (!append) {
    grid.innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Loading songs...</div></div>`;
    document.getElementById("loadMoreWrap").style.display = "none";
    nextPageToken = null;
    totalLoaded = 0;
  } else {
    document.getElementById("loadMoreBtn").textContent = "Loading...";
    document.getElementById("loadMoreBtn").disabled = true;
  }

  try {
    // Always include "super simple songs" in query to ensure correct channel results
    const rawQ = query ? `super simple songs ${query}` : "";
    const q = rawQ ? encodeURIComponent(rawQ) : "";
    const qParam = q ? `&q=${q}` : "";
    const pageParam = pageToken ? `&pageToken=${pageToken}` : "";
    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${SSS_CHANNEL_ID}&type=video&maxResults=24&order=${order}${qParam}&key=${YT_API_KEY}${pageParam}`;
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();

    if (searchData.error) throw new Error(searchData.error.message);
    if (!searchData.items?.length) throw new Error("No videos found");

    nextPageToken = searchData.nextPageToken || null;

    // Fetch stats
    const ids = searchData.items.map(i => i.id.videoId).join(",");
    const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${YT_API_KEY}`;
    const statsRes = await fetch(statsUrl);
    const statsData = await statsRes.json();
    const statsMap = {};
    statsData.items?.forEach(v => statsMap[v.id] = v.statistics);

    // Build cards
    const html = searchData.items.map((item, i) => {
      const vid   = item.id.videoId;
      const title = item.snippet.title;
      const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url;
      const views = statsMap[vid] ? formatViews(statsMap[vid].viewCount) : '';
      const date  = timeAgo(item.snippet.publishedAt);
      const color = ACCENT_COLORS[(totalLoaded + i) % ACCENT_COLORS.length];
      return `
        <div class="song-card" onclick="openSong('${vid}','${title.replace(/'/g,"\\'").replace(/"/g,'&quot;')}','${color}')">
          <div class="card-thumb-wrap">
            <img class="card-thumb" src="${thumb}" loading="lazy" alt="${title}" />
            <div class="play-overlay"><div class="play-btn">▶</div></div>
          </div>
          <div class="card-body">
            <div class="card-channel">▶ Super Simple Songs</div>
            <div class="card-title">${title}</div>
            <div class="card-meta">
              ${views ? `<span class="card-views">👁 ${views}</span>` : ''}
              <span class="card-date">📅 ${date}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    totalLoaded += searchData.items.length;
    document.getElementById("resultsCount").textContent = `${totalLoaded} song${totalLoaded !== 1 ? 's' : ''}${nextPageToken ? '+' : ''}`;
    document.getElementById("songCountBadge").textContent = `▶ ${totalLoaded} songs loaded`;

    if (!append) {
      grid.innerHTML = html;
    } else {
      // Remove loading spinner rows if any, then append
      grid.insertAdjacentHTML('beforeend', html);
    }

    // Show/hide load more
    if (nextPageToken) {
      document.getElementById("loadMoreWrap").style.display = "block";
      document.getElementById("loadMoreBtn").textContent = "Load More Songs ▼";
      document.getElementById("loadMoreBtn").disabled = false;
    } else {
      document.getElementById("loadMoreWrap").style.display = "none";
    }

  } catch(e) {
    console.error(e);
    if (!append) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-emoji">😢</div>
          <div class="empty-title">Could not load songs</div>
          <div class="empty-sub">${e.message}<br><br>Check your internet connection<br>and try again.</div>
        </div>`;
    }
    document.getElementById("loadMoreWrap").style.display = "none";
  }
}

function loadMore() {
  if (nextPageToken) {
    fetchVideos(currentQuery, currentOrder, nextPageToken, true);
  }
}

// ── SEARCH ──
let searchTimer = null;
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentQuery = document.getElementById("searchInput").value.trim();
    currentOrder = document.getElementById("orderFilter").value;
    const title = currentQuery
      ? `🔍 Results for "${currentQuery}"`
      : `🎵 Latest Songs`;
    document.getElementById("pageTitle").textContent = title;
    fetchVideos(currentQuery, currentOrder, null, false);
  }, 500);
}

// ── OPEN MODAL ──
function openSong(youtubeId, title, color) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalHeader").style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
  document.getElementById("videoFrame").src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0`;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.getElementById("videoFrame").src = "";
  document.body.style.overflow = "";
}

// ── EVENTS ──
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById("searchInput").addEventListener("input", onSearchInput);
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    clearTimeout(searchTimer);
    currentQuery = document.getElementById("searchInput").value.trim();
    currentOrder = document.getElementById("orderFilter").value;
    document.getElementById("pageTitle").textContent = currentQuery ? `🔍 "${currentQuery}"` : `🎵 Latest Songs`;
    fetchVideos(currentQuery, currentOrder, null, false);
  }
});
document.getElementById("searchBtn").addEventListener("click", () => {
  clearTimeout(searchTimer);
  currentQuery = document.getElementById("searchInput").value.trim();
  currentOrder = document.getElementById("orderFilter").value;
  document.getElementById("pageTitle").textContent = currentQuery ? `🔍 "${currentQuery}"` : `🎵 Latest Songs`;
  fetchVideos(currentQuery, currentOrder, null, false);
});
document.getElementById("orderFilter").addEventListener("change", () => {
  currentOrder = document.getElementById("orderFilter").value;
  fetchVideos(currentQuery, currentOrder, null, false);
});

// ── INIT ──
loadChannelLogo();
fetchVideos("", "date", null, false);
</script>
</body>
</html>
