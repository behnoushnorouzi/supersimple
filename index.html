<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Super Simple Songs 🎵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: #FFF8F0; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  .header { background: #FFD700; padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .logo-circle { width: 56px; height: 56px; background: rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; border: 3px solid rgba(255,255,255,0.6); }
  .header-title { font-size: 26px; font-weight: 900; color: #CC4400; letter-spacing: 1.5px; text-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .header-sub { font-size: 13px; color: #996600; font-weight: 700; }

  /* SEARCH */
  .search-row { display: flex; gap: 8px; flex-wrap: wrap; background: rgba(255,255,255,0.4); border-radius: 14px; padding: 10px 12px; }
  .search-input { flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 12px; border: none; font-size: 17px; font-family: 'Nunito', sans-serif; font-weight: 700; background: #fff; color: #333; outline: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .filter-select { padding: 12px 14px; border-radius: 12px; border: none; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 700; background: #fff; color: #555; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .search-btn { padding: 12px 20px; border-radius: 12px; border: none; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 900; background: #FF6B6B; color: #fff; cursor: pointer; box-shadow: 0 2px 8px rgba(255,107,107,0.4); transition: transform 0.1s; white-space: nowrap; }
  .search-btn:active { transform: scale(0.95); }

  /* TABS */
  .tabs { display: flex; gap: 10px; padding: 16px 16px 8px; }
  .tab { padding: 10px 20px; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
  .tab.active { background: #FFD700; color: #CC4400; border-color: #CC4400; }
  .tab.inactive { background: #fff; color: #aaa; border-color: #eee; }

  /* MAIN */
  .main { padding: 8px 16px 16px; }
  .results-count { font-size: 15px; color: #aaa; font-weight: 700; margin-bottom: 14px; padding-left: 4px; }

  /* SONG GRID */
  .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .song-card { border-radius: 20px; overflow: hidden; border: 3px solid transparent; cursor: pointer; background: #fff; box-shadow: 0 3px 12px rgba(0,0,0,0.08); position: relative; transition: transform 0.15s ease; }
  .song-card:active { transform: scale(0.94); }
  .thumb { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 54px; }
  .thumb-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
  .new-badge { position: absolute; top: 8px; left: 8px; background: #E83B3B; color: #fff; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 8px; }
  .song-tag { display: block; width: fit-content; margin: 6px auto 4px; font-size: 12px; padding: 3px 12px; border-radius: 20px; font-weight: 800; color: #fff; }
  .song-title { padding: 4px 10px 14px; font-size: 14px; font-weight: 800; text-align: center; line-height: 1.3; }

  /* YOUTUBE RESULTS */
  .yt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .yt-card { border-radius: 16px; overflow: hidden; background: #fff; box-shadow: 0 3px 12px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.15s; border: 3px solid #FFD700; }
  .yt-card:active { transform: scale(0.95); }
  .yt-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #eee; }
  .yt-info { padding: 10px 12px 12px; }
  .yt-title { font-size: 14px; font-weight: 800; color: #333; line-height: 1.3; margin-bottom: 4px; }
  .yt-channel { font-size: 12px; color: #FF6B6B; font-weight: 700; }

  /* LOADING */
  .loading { text-align: center; padding: 50px 20px; font-size: 20px; font-weight: 800; color: #FFD700; grid-column: 1/-1; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 4px solid #FFD700; border-top-color: #FF6B6B; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-results { text-align: center; padding: 60px 20px; font-size: 22px; font-weight: 800; color: #ccc; grid-column: 1/-1; }

  /* DETAIL OVERLAY */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 12px; }
  .detail-overlay.open { display: flex; }
  .detail-panel { background: #fff; border-radius: 24px; width: 100%; max-width: 960px; max-height: 94vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
  .detail-header { padding: 18px 20px 14px; border-radius: 24px 24px 0 0; display: flex; align-items: center; gap: 14px; }
  .detail-emoji { font-size: 36px; }
  .detail-title { font-size: 20px; font-weight: 900; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.2); flex: 1; line-height: 1.2; }
  .close-btn { width: 46px; height: 46px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5); color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; }
  .detail-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .video-wrapper { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; background: #1a1a2e; }
  .video-wrapper iframe { width: 100%; height: 100%; border: none; }

  /* LYRICS */
  .lyrics-box { background: #FFF8F0; border-radius: 16px; padding: 20px; border: 3px solid #FFD03A; }
  .lyrics-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 3px dashed #FFD03A; }
  .lyrics-song-title { font-size: 20px; font-weight: 900; color: #FF6B6B; }
  .lyrics-content { font-size: 22px; font-weight: 700; color: #333; line-height: 2.2; }
  .verse-label { display: block; font-size: 15px; font-weight: 800; color: #bbb; font-style: italic; margin: 14px 0 4px; }
  .lyrics-note { font-size: 14px; color: #aaa; font-weight: 600; font-style: italic; margin-top: 16px; text-align: center; }

  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-thumb { background: #FFD03A; border-radius: 10px; }

  @media (min-width: 600px) {
    .song-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .yt-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .detail-body { flex-direction: row; align-items: flex-start; }
    .video-wrapper { flex: 1.4; }
    .lyrics-box { flex: 1; max-height: 70vh; overflow-y: auto; }
  }
  @media (min-width: 900px) {
    .song-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .header-title { font-size: 30px; }
    .lyrics-content { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-circle">🎵</div>
    <div>
      <div class="header-title">SUPER SIMPLE SONGS</div>
      <div class="header-sub">Kids songs &amp; nursery rhymes with lyrics 🌈</div>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" id="searchInput" placeholder="🔍 Search any song..." />
    <select class="filter-select" id="themeFilter">
      <option value="">🎨 All Themes</option>
      <option>Animals</option><option>Bedtime</option><option>Body</option>
      <option>Colors</option><option>Fun</option><option>Alphabet</option>
      <option>Numbers</option><option>Transport</option><option>Ocean</option><option>Seasons</option>
    </select>
    <button class="search-btn" id="searchBtn">🔍 Search YouTube</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tabFavorites" onclick="switchTab('favorites')">⭐ Favourites (20)</div>
  <div class="tab inactive" id="tabYoutube" onclick="switchTab('youtube')">▶ YouTube Results</div>
</div>

<div class="main">
  <div class="results-count" id="resultsCount"></div>
  <div id="favSection">
    <div class="song-grid" id="songGrid"></div>
  </div>
  <div id="ytSection" style="display:none;">
    <div class="yt-grid" id="ytGrid"></div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel">
    <div class="detail-header" id="detailHeader">
      <div class="detail-emoji" id="detailEmoji"></div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="close-btn" onclick="closeDetail()">✕</div>
    </div>
    <div class="detail-body">
      <div class="video-wrapper"><iframe id="videoFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe></div>
      <div class="lyrics-box">
        <div class="lyrics-header">
          <span style="font-size:26px;">🎵</span>
          <div class="lyrics-song-title" id="lyricsSongTitle">Lyrics</div>
        </div>
        <div class="lyrics-content" id="lyricsContent"></div>
      </div>
    </div>
  </div>
</div>

const COLORS = ["#FF6B6B","#FF9F43","#FFD03A","#6BCB77","#4D96FF","#C77DFF","#FF6B9D","#26C6DA"];
const BGS    = ["#FFF0F0","#FFF5E8","#FFFBE8","#F0FFF2","#EFF5FF","#F8F0FF","#FFF0F6","#E0FEFF"];

let currentTab = 'favorites';

// ── FILTER FAVOURITES ────────────────────────────────────────────
function filterSongs() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const theme = document.getElementById("themeFilter").value;
  const filtered = SONGS.filter(s =>
    (!q || s.title.toLowerCase().includes(q)) &&
    (!theme || s.theme === theme)
  );
  renderGrid(filtered);
  if (currentTab !== 'favorites') switchTab('favorites');
}

function renderGrid(songs) {
  const grid = document.getElementById("songGrid");
  document.getElementById("resultsCount").textContent = `Showing ${songs.length} of ${SONGS.length} favourite songs ⭐`;
  if (!songs.length) {
    grid.innerHTML = `<div class="no-results">😢 No songs found! Try YouTube search 👆</div>`;
    return;
  }
  grid.innerHTML = songs.map(s => `
    <div class="song-card" style="border-color:${s.color};background:${s.bg}" onclick="openSong('${s.youtubeId}','${s.title.replace(/'/g,"\\'")}','${s.emoji}','${s.color}',${s.id})">
      <div class="thumb" style="background:${s.bg}">${s.emoji}</div>
      ${s.isNew ? '<span class="new-badge">NEW!</span>' : ''}
      <span class="song-tag" style="background:${s.color}">${s.theme}</span>
      <div class="song-title" style="color:${s.color}">${s.title}</div>
    </div>
  `).join('');
}

// ── YOUTUBE SEARCH ───────────────────────────────────────────────
async function searchYouTube() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) { alert("Please type a song name first! 🎵"); return; }

  switchTab('youtube');
  const grid = document.getElementById("ytGrid");
  document.getElementById("resultsCount").textContent = `Searching YouTube for "${q}"...`;
  grid.innerHTML = `<div class="loading"><span class="spinner"></span>Searching YouTube...</div>`;

  // Use YouTube RSS/search redirect — opens in app using noembed for thumbnails
  const query = encodeURIComponent("Super Simple Songs " + q);
  const url = `https://www.youtube.com/results?search_query=${query}`;

  // Use noembed-compatible approach: build cards linking to YouTube search
  // We use invidious public API (no key needed) to search
  const apiUrl = `https://inv.tux.pizza/api/v1/search?q=${query}&type=video&page=1`;

  try {
    const res = await fetch(apiUrl);
    const data = await res.json();
    if (!data || !data.length) throw new Error("No results");
    renderYTResults(data.slice(0, 12), q);
  } catch(e) {
    // Fallback: show YouTube search button
    document.getElementById("resultsCount").textContent = `Search results for "${q}" on YouTube`;
    grid.innerHTML = `
      <div style="grid-column:1/-1; text-align:center; padding: 30px 20px;">
        <div style="font-size:48px; margin-bottom:16px;">▶️</div>
        <div style="font-size:20px; font-weight:800; color:#333; margin-bottom:10px;">Open YouTube to watch!</div>
        <div style="font-size:15px; color:#aaa; margin-bottom:20px;">Tap below to search Super Simple Songs on YouTube</div>
        <a href="https://www.youtube.com/results?search_query=${query}" target="_blank"
           style="display:inline-block; background:#FF0000; color:#fff; font-size:18px; font-weight:900; padding:14px 28px; border-radius:14px; text-decoration:none; font-family:Nunito,sans-serif;">
          🔴 Search on YouTube
        </a>
      </div>`;
  }
}

function renderYTResults(videos, query) {
  const grid = document.getElementById("ytGrid");
  document.getElementById("resultsCount").textContent = `YouTube results for "${query}" 🎵`;
  grid.innerHTML = videos.map((v, i) => {
    const vid = v.videoId;
    const title = v.title || "Super Simple Song";
    const thumb = v.videoThumbnails?.[0]?.url || `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
    const color = COLORS[i % COLORS.length];
    return `
      <div class="yt-card" style="border-color:${color}" onclick="openSong('${vid}','${title.replace(/'/g,"\\'")}','🎵','${color}',null)">
        <img class="yt-thumb" src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${vid}/default.jpg'" />
        <div class="yt-info">
          <div class="yt-title">${title}</div>
          <div class="yt-channel" style="color:${color}">▶ Super Simple Songs</div>
        </div>
      </div>`;
  }).join('');
}

// ── OPEN SONG ────────────────────────────────────────────────────
function openSong(youtubeId, title, emoji, color, songId) {
  document.getElementById("detailEmoji").textContent = emoji;
  document.getElementById("detailTitle").textContent = title;
  document.getElementById("lyricsSongTitle").textContent = title;
  document.getElementById("detailHeader").style.background = `linear-gradient(135deg, ${color}, ${color}bb)`;
  document.getElementById("videoFrame").src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0`;

  // Show lyrics if hardcoded song
  const song = songId ? SONGS.find(s => s.id === songId) : null;
  if (song && song.lyrics) {
    const html = song.lyrics.split('\n').map(line => {
      if (line.match(/^\[.+\]$/)) return `<span class="verse-label">${line}</span>`;
      if (!line.trim()) return '<br>';
      return line + '<br>';
    }).join('');
    document.getElementById("lyricsContent").innerHTML = html;
  } else {
    document.getElementById("lyricsContent").innerHTML = `
      <div style="text-align:center; padding:20px;">
        <div style="font-size:40px; margin-bottom:12px;">🎵</div>
        <div style="font-size:20px; font-weight:800; color:#aaa;">Watch the video to sing along!</div>
        <div class="lyrics-note">This song is from YouTube search.<br>Add it to favourites to see lyrics!</div>
      </div>`;
  }

  document.getElementById("detailOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDetail() {
  document.getElementById("detailOverlay").classList.remove("open");
  document.getElementById("videoFrame").src = "";
  document.body.style.overflow = "";
}

// ── TABS ─────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById("favSection").style.display = tab === 'favorites' ? '' : 'none';
  document.getElementById("ytSection").style.display = tab === 'youtube' ? '' : 'none';
  document.getElementById("tabFavorites").className = `tab ${tab === 'favorites' ? 'active' : 'inactive'}`;
  document.getElementById("tabYoutube").className = `tab ${tab === 'youtube' ? 'active' : 'inactive'}`;
  if (tab === 'favorites') {
    document.getElementById("resultsCount").textContent = `Showing ${SONGS.length} of ${SONGS.length} favourite songs ⭐`;
  }
}

// ── CLOSE ON BACKDROP ────────────────────────────────────────────
document.getElementById("detailOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeDetail();
});

// ── EVENT LISTENERS ──────────────────────────────────────────────
document.getElementById("searchInput").addEventListener("input", filterSongs);
document.getElementById("searchInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") searchYouTube();
});
document.getElementById("themeFilter").addEventListener("change", filterSongs);
document.getElementById("searchBtn").addEventListener("click", searchYouTube);

// ── INIT ─────────────────────────────────────────────────────────
renderGrid(SONGS);
</script>
</body>
</html>
