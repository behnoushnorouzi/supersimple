<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Super Simple Songs 🎵 Safe Player</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFD700;
  --yellow-dark: #F5A800;
  --red: #FF5A5A;
  --bg: #FFFDF5;
  --card-bg: #FFFFFF;
  --text: #1A1A2E;
  --text-muted: #9999AA;
  --border: #F0EDE6;
  --shadow: 0 4px 24px rgba(0,0,0,0.07);
  --radius: 20px;
  --max-width: 1200px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
.site-header { background: var(--yellow); border-bottom: 3px solid var(--yellow-dark); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(245,168,0,0.25); }
.header-inner { max-width: var(--max-width); margin: 0 auto; padding: 18px 32px 14px; }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-icon { width: 52px; height: 52px; background: rgba(255,255,255,0.45); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 2px solid rgba(255,255,255,0.6); flex-shrink: 0; }
.brand-name { font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; color: #7A3800; line-height: 1; }

.search-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
.search-input { width: 100%; padding: 11px 16px 11px 40px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.7); font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 700; background: #fff; color: var(--text); outline: none; }

.filter-select { padding: 11px 14px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.7); font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 700; background: #fff; cursor: pointer; }
.search-btn { padding: 11px 24px; border-radius: 14px; border: none; font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 900; background: var(--red); color: #fff; cursor: pointer; box-shadow: 0 4px 14px rgba(255,0,0,0.3); transition: transform 0.15s; }
.search-btn:active { transform: scale(0.96); }

/* GRID */
.page { max-width: var(--max-width); margin: 0 auto; padding: 28px 32px 48px; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.page-title { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; }
.song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

.song-card { border-radius: var(--radius); overflow: hidden; cursor: pointer; background: var(--card-bg); box-shadow: var(--shadow); border: 2px solid var(--border); transition: transform 0.2s; position: relative; }
.song-card:hover { transform: translateY(-5px); }
.card-thumb-wrap { width: 100%; aspect-ratio: 16/9; position: relative; background: #000; }
.card-thumb { width: 100%; height: 100%; object-fit: cover; }
.card-body { padding: 12px; }
.card-title { font-size: 14px; font-weight: 800; line-height: 1.35; height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: #000; border-radius: 28px; width: 100%; max-width: 900px; overflow: hidden; position: relative; }
.modal-close { position: absolute; top: 10px; right: 10px; z-index: 10; width: 35px; height: 35px; border-radius: 50%; border: none; background: #fff; font-weight: bold; cursor: pointer; }
.video-wrap { width: 100%; aspect-ratio: 16/9; }
.video-wrap iframe { width: 100%; height: 100%; border: none; }

/* LOADING */
.loading-state { grid-column: 1/-1; text-align: center; padding: 60px; }
.spinner { width: 40px; height: 40px; border: 4px solid #F0EDE6; border-top-color: var(--yellow-dark); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .header-inner { padding: 14px 16px; }
  .song-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="brand">
        <div class="brand-icon">🐥</div>
        <div>
          <div class="brand-name">Super Simple Songs</div>
        </div>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search for a song..." />
      </div>
      <select class="filter-select" id="orderFilter">
        <option value="relevance">Relevance</option>
        <option value="date">Newest First</option>
        <option value="viewCount">Most Popular</option>
      </select>
      <button class="search-btn" id="searchBtn">▶ Search</button>
    </div>
  </div>
</header>

<div class="page">
  <div class="page-header">
    <div class="page-title" id="pageTitle">🎵 Latest Songs</div>
  </div>
  <div class="song-grid" id="songGrid"></div>
  <div style="text-align:center; margin-top:20px;">
    <button id="loadMoreBtn" style="display:none; padding:10px 20px; border-radius:12px; border:2px solid var(--yellow-dark); background:#fff; font-weight:800; cursor:pointer;">Load More</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="video-wrap">
      <iframe id="videoFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
// --- CONFIG ---
const API_KEY = "AIzaSyBNEhmX7ztsjMFMrL4V6RKub6no8P8X2kM"; // Replace if needed
const CHANNEL_ID = "UCLsooMJoIpl_7ux2jvdPB-Q";

let nextPageToken = "";
let currentQuery = "";
let currentOrder = "date";

// --- SEARCH ENGINE ---
async function fetchVideos(query = "", order = "date", pageToken = "", append = false) {
    const grid = document.getElementById("songGrid");
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    
    if (!append) {
        grid.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Searching...</p></div>';
        nextPageToken = "";
    }

    try {
        // Clean query: Remove "Super Simple Songs" if the user typed it to avoid confusing the API
        let cleanQuery = query.toLowerCase().replace(/super simple songs/g, "").trim();
        
        let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&maxResults=20&key=${API_KEY}&order=${order}&pageToken=${pageToken}`;
        
        if (cleanQuery) {
            url += `&q=${encodeURIComponent(cleanQuery)}`;
        }

        const res = await fetch(url);
        const data = await res.json();

        if (!append) grid.innerHTML = "";
        
        if (data.items && data.items.length > 0) {
            data.items.forEach(item => {
                const vid = item.id.videoId;
                const title = item.snippet.title;
                const thumb = item.snippet.thumbnails.medium.url;

                const card = document.createElement("div");
                card.className = "song-card";
                card.innerHTML = `
                    <div class="card-thumb-wrap"><img class="card-thumb" src="${thumb}"></div>
                    <div class="card-body"><div class="card-title">${title}</div></div>
                `;
                card.onclick = () => openVideo(vid);
                grid.appendChild(card);
            });

            nextPageToken = data.nextPageToken || "";
            loadMoreBtn.style.display = nextPageToken ? "inline-block" : "none";
        } else {
            grid.innerHTML = '<div class="loading-state"><p>No songs found. Try a different word!</p></div>';
        }
    } catch (e) {
        console.error(e);
        grid.innerHTML = '<div class="loading-state"><p>Error connecting to YouTube.</p></div>';
    }
}

// --- PLAYER ---
function openVideo(id) {
    const frame = document.getElementById("videoFrame");
    // rel=0: Only show related videos from the same channel
    // modestbranding=1: Remove YouTube logo from player
    frame.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3`;
    document.getElementById("modalOverlay").classList.add("open");
    document.body.style.overflow = "hidden";
}

function closeModal() {
    document.getElementById("videoFrame").src = "";
    document.getElementById("modalOverlay").classList.remove("open");
    document.body.style.overflow = "auto";
}

// --- EVENTS ---
document.getElementById("searchBtn").onclick = () => {
    const input = document.getElementById("searchInput").value.trim();
    currentQuery = input;
    
    // Switch order to Relevance if searching, otherwise stick to filter
    const filter = document.getElementById("orderFilter");
    if (input && filter.value === "date") {
        filter.value = "relevance";
    }
    
    currentOrder = filter.value;
    document.getElementById("pageTitle").textContent = input ? `🔍 Results for "${input}"` : "🎵 Latest Songs";
    fetchVideos(currentQuery, currentOrder);
};

document.getElementById("searchInput").onkeydown = (e) => {
    if (e.key === "Enter") document.getElementById("searchBtn").click();
};

document.getElementById("loadMoreBtn").onclick = () => {
    fetchVideos(currentQuery, currentOrder, nextPageToken, true);
};

document.getElementById("modalOverlay").onclick = (e) => {
    if (e.target.id === "modalOverlay") closeModal();
};

// Initial load
fetchVideos("", "date");
</script>
</body>
</html>
