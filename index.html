<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FF6B6B">
<title>Super Simple Songs</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --c1: #FF6B6B;
  --c2: #FFD93D;
  --c3: #6BCB77;
  --c4: #4D96FF;
  --c5: #FF9F43;
  --c6: #A29BFE;
  --c7: #FD79A8;
  --c8: #00CEC9;
  --bg: #FFF9F0;
  --dark: #2D3436;
  --radius: 20px;
  --font-title: 'Fredoka One', cursive;
  --font-body: 'Nunito', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--dark);
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, var(--c1) 0%, var(--c7) 40%, var(--c6) 100%);
  padding: 24px 20px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -30px; left: -30px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -40px; right: -20px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}
.header-notes {
  font-size: 28px;
  margin-bottom: 4px;
  animation: bounce 1.5s ease-in-out infinite;
  display: block;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.header h1 {
  font-family: var(--font-title);
  font-size: 32px;
  color: #fff;
  letter-spacing: 1px;
  text-shadow: 0 3px 0 rgba(0,0,0,0.15);
  position: relative; z-index: 1;
}
.header p {
  color: rgba(255,255,255,0.9);
  font-size: 14px;
  font-weight: 600;
  margin-top: 4px;
  position: relative; z-index: 1;
}

/* ===== SEARCH ===== */
.search-wrap {
  padding: 20px 16px 12px;
}
.search-box {
  display: flex;
  background: #fff;
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(255,107,107,0.25);
  border: 3px solid var(--c1);
  overflow: hidden;
  align-items: center;
}
.search-box input {
  flex: 1;
  border: none;
  outline: none;
  padding: 14px 18px;
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  color: var(--dark);
  background: transparent;
}
.search-box input::placeholder { color: #bbb; font-weight: 400; }
.search-btn {
  background: var(--c1);
  border: none;
  padding: 12px 20px;
  font-size: 22px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  line-height: 1;
}
.search-btn:active { transform: scale(0.92); background: #e05555; }

/* ===== CHIPS ===== */
.chips-label {
  padding: 0 16px 8px;
  font-size: 12px;
  font-weight: 800;
  color: var(--c6);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.chips-scroll {
  display: flex;
  gap: 10px;
  padding: 0 16px 20px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.chips-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 50px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  color: #fff;
  transition: transform 0.15s, filter 0.15s;
  white-space: nowrap;
}
.chip:active { transform: scale(0.93); filter: brightness(0.9); }
.chip:nth-child(1) { background: var(--c1); }
.chip:nth-child(2) { background: var(--c4); }
.chip:nth-child(3) { background: var(--c3); }
.chip:nth-child(4) { background: var(--c5); }
.chip:nth-child(5) { background: var(--c7); }
.chip:nth-child(6) { background: var(--c6); }
.chip:nth-child(7) { background: var(--c8); }

/* ===== STATUS ===== */
.status {
  text-align: center;
  padding: 40px 20px;
  font-size: 15px;
  color: #999;
  font-weight: 600;
}
.spinner {
  width: 36px; height: 36px;
  border: 4px solid #f0e0ff;
  border-top-color: var(--c6);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESULTS GRID ===== */
.section-label {
  padding: 4px 16px 10px;
  font-family: var(--font-title);
  font-size: 20px;
  color: var(--dark);
}
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  padding: 0 16px 20px;
}
.song-card {
  background: #fff;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  border: 3px solid transparent;
  position: relative;
}
.song-card:active { transform: scale(0.95); }
.song-card.active { border-color: var(--c3); box-shadow: 0 4px 20px rgba(107,203,119,0.4); }

.card-colors { position: absolute; top: 0; left: 0; right: 0; height: 6px; }
.song-card:nth-child(1) .card-colors { background: var(--c1); }
.song-card:nth-child(2) .card-colors { background: var(--c4); }
.song-card:nth-child(3) .card-colors { background: var(--c3); }
.song-card:nth-child(4) .card-colors { background: var(--c5); }
.song-card:nth-child(5) .card-colors { background: var(--c7); }
.song-card:nth-child(6) .card-colors { background: var(--c6); }
.song-card:nth-child(7) .card-colors { background: var(--c8); }
.song-card:nth-child(8) .card-colors { background: var(--c2); }

.card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: #f5f0ff;
  overflow: hidden;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-body { padding: 10px 10px 12px; }
.card-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--dark);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-sub { font-size: 11px; color: #aaa; margin-top: 3px; font-weight: 600; }

/* ===== PLAYER ===== */
.player-wrap {
  margin: 0 16px 16px;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  border: 3px solid var(--c4);
}
.video-container {
  position: relative;
  aspect-ratio: 16/9;
  background: #000;
}
.video-container iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
}
.player-bar {
  background: linear-gradient(90deg, var(--c4) 0%, var(--c6) 100%);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.player-note { font-size: 20px; }
.player-text { flex: 1; }
.player-title { font-family: var(--font-title); color: #fff; font-size: 16px; line-height: 1.2; }
.player-meta { font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 600; }
.player-open-btn {
  background: rgba(255,255,255,0.25);
  border: 2px solid rgba(255,255,255,0.5);
  color: #fff;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 20px;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
}

/* ===== LYRICS / INFO TABS ===== */
.bottom-card {
  margin: 0 16px 30px;
  background: #fff;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.tabs {
  display: flex;
  background: #f8f0ff;
}
.tab-btn {
  flex: 1;
  padding: 14px;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  color: #bbb;
  cursor: pointer;
  transition: color 0.2s, background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab-btn.active {
  background: #fff;
  color: var(--c7);
  border-bottom: 3px solid var(--c7);
}
.tab-btn .tab-icon { font-size: 16px; }
.tab-content { padding: 20px; }
.lyrics-text {
  font-size: 16px;
  line-height: 2;
  color: var(--dark);
  white-space: pre-wrap;
  font-weight: 600;
}
.lyrics-text.loading { color: #bbb; font-style: italic; font-weight: 400; }

/* Rainbow lyrics lines */
.lyrics-line { display: block; }
.lyrics-line:nth-child(4n+1) { color: var(--c1); }
.lyrics-line:nth-child(4n+2) { color: var(--c4); }
.lyrics-line:nth-child(4n+3) { color: var(--c3); }
.lyrics-line:nth-child(4n+4) { color: var(--c5); }
.lyrics-line:empty { height: 12px; display: block; }

.info-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--dark);
  font-weight: 600;
}
.info-badge {
  display: inline-block;
  background: var(--c2);
  color: #7a5400;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 12px;
}

/* ===== FLOATING DECO ===== */
.deco {
  position: fixed;
  pointer-events: none;
  z-index: -1;
  font-size: 40px;
  opacity: 0.07;
  animation: float linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.07; }
  90% { opacity: 0.07; }
  100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

/* ===== INSTALL BANNER ===== */
.install-banner {
  margin: 0 16px 16px;
  background: linear-gradient(135deg, var(--c3), var(--c8));
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 4px 16px rgba(107,203,119,0.3);
}
.install-banner-text { flex: 1; }
.install-banner-title { font-weight: 800; color: #fff; font-size: 14px; }
.install-banner-sub { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 600; }
.install-banner-btn {
  background: #fff;
  color: var(--c3);
  border: none;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 800;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}
</style>
</head>
<body>

<!-- Floating decorations -->
<span class="deco" style="left:10%; animation-duration:12s; animation-delay:0s;">🎵</span>
<span class="deco" style="left:30%; animation-duration:15s; animation-delay:3s;">⭐</span>
<span class="deco" style="left:55%; animation-duration:10s; animation-delay:6s;">🎶</span>
<span class="deco" style="left:75%; animation-duration:14s; animation-delay:1s;">🌈</span>
<span class="deco" style="left:88%; animation-duration:11s; animation-delay:8s;">🎤</span>

<div class="header">
  <span class="header-notes">🎵 🎤 🎵</span>
  <h1>Super Simple Songs</h1>
  <p>Search · Watch · Sing Along!</p>
</div>

<!-- Install banner -->
<div class="install-banner" id="install-banner">
  <span style="font-size:28px;">📲</span>
  <div class="install-banner-text">
    <div class="install-banner-title">Install on your tablet!</div>
    <div class="install-banner-sub">Tap the menu → "Add to Home Screen"</div>
  </div>
  <button class="install-banner-btn" onclick="document.getElementById('install-banner').style.display='none'">Got it!</button>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Find a song..." />
    <button class="search-btn" id="search-btn">🔍</button>
  </div>
</div>

<div class="chips-label">Quick picks</div>
<div class="chips-scroll">
  <button class="chip" onclick="quickSearch('Baby Shark')">🦈 Baby Shark</button>
  <button class="chip" onclick="quickSearch('Twinkle Twinkle')">⭐ Twinkle Twinkle</button>
  <button class="chip" onclick="quickSearch('Head Shoulders')">🙌 Head & Shoulders</button>
  <button class="chip" onclick="quickSearch('Wheels on the Bus')">🚌 Wheels on Bus</button>
  <button class="chip" onclick="quickSearch('Old MacDonald')">🐄 Old MacDonald</button>
  <button class="chip" onclick="quickSearch('ABC Song')">🔤 ABC Song</button>
  <button class="chip" onclick="quickSearch('Five Little Ducks')">🐥 Little Ducks</button>
</div>

<div id="results-area"></div>
<div id="player-area" style="display:none;"></div>

<script>
const KNOWN = [
  { title:"Baby Shark", slug:"baby-shark", youtubeId:"XqZsoesa55w" },
  { title:"Twinkle Twinkle Little Star", slug:"twinkle-twinkle-little-star", youtubeId:"yCjJyiqpAuU" },
  { title:"Head, Shoulders, Knees & Toes", slug:"head-shoulders-knees-and-toes", youtubeId:"h4eueDYPTIg" },
  { title:"The Wheels on the Bus", slug:"the-wheels-on-the-bus", youtubeId:"e_04ZrNroTo" },
  { title:"Old MacDonald Had a Farm", slug:"old-macdonald-had-a-farm", youtubeId:"5VxGMqjT_8o" },
  { title:"If You're Happy and You Know It", slug:"if-youre-happy-and-you-know-it", youtubeId:"71hqRT9U0wg" },
  { title:"The ABC Song", slug:"the-abc-song", youtubeId:"36IBDpTRVNE" },
  { title:"Five Little Ducks", slug:"five-little-ducks", youtubeId:"IO04KFPwVqU" },
  { title:"Baa Baa Black Sheep", slug:"baa-baa-black-sheep", youtubeId:"UhJE9b_Rfi0" },
  { title:"Mary Had a Little Lamb", slug:"mary-had-a-little-lamb", youtubeId:"eVqHOBKbDn0" },
  { title:"Itsy Bitsy Spider", slug:"itsy-bitsy-spider", youtubeId:"9ox2shpfFJM" },
  { title:"Row Row Row Your Boat", slug:"row-row-row-your-boat", youtubeId:"7oyiPBjLAWY" },
  { title:"Hello!", slug:"hello", youtubeId:"tVlcKp3bWH8" },
  { title:"Hickory Dickory Dock", slug:"hickory-dickory-dock", youtubeId:"6XNUoWJfkc8" },
  { title:"Rain Rain Go Away", slug:"rain-rain-go-away", youtubeId:"YHqnEHAzL14" },
  { title:"Johny Johny Yes Papa", slug:"johny-johny-yes-papa", youtubeId:"Z3lLnFxlUe0" },
  { title:"Walking in the Jungle", slug:"walking-in-the-jungle", youtubeId:"S4E0RlV-WZQ" },
  { title:"Skidamarink", slug:"skidamarink", youtubeId:"TYFOqhMNDhk" },
  { title:"Open Shut Them", slug:"open-shut-them", youtubeId:"hxNmwLbKxAM" },
  { title:"One Two Three Four Five", slug:"one-two-three-four-five", youtubeId:"GkqyQOUFkM8" },
];

let activeTab = 'lyrics';

function quickSearch(q) {
  document.getElementById('search-input').value = q;
  doSearch(q);
}

document.getElementById('search-btn').onclick = () => {
  const q = document.getElementById('search-input').value.trim();
  if (q) doSearch(q);
};
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) doSearch(q); }
});

async function doSearch(query) {
  const area = document.getElementById('results-area');
  area.innerHTML = `<div class="status"><div class="spinner"></div>Finding songs for "${query}"...</div>`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a Super Simple Songs search assistant. Return matching songs from Super Simple Songs library as a JSON array. Each object: {title, slug (supersimple.com/song/[slug]/ format), youtubeId}. 4-8 results max. Only real songs. Return ONLY the JSON array, nothing else.`,
        messages: [{ role: 'user', content: `Search: "${query}"\nReference: ${JSON.stringify(KNOWN.map(s=>({title:s.title,slug:s.slug,youtubeId:s.youtubeId})))}` }]
      })
    });
    const data = await res.json();
    const text = data.content.map(c => c.text||'').join('');
    const songs = JSON.parse(text.replace(/```json|```/g,'').trim());
    renderResults(songs);
  } catch(e) {
    area.innerHTML = '<div class="status">😕 Could not find songs. Try again!</div>';
  }
}

function renderResults(songs) {
  const area = document.getElementById('results-area');
  if (!songs.length) { area.innerHTML = '<div class="status">No songs found. Try another search! 🎵</div>'; return; }

  const colors = ['#FF6B6B','#4D96FF','#6BCB77','#FF9F43','#FD79A8','#A29BFE','#00CEC9','#FFD93D'];
  area.innerHTML = `
    <div class="section-label">🎵 ${songs.length} songs found</div>
    <div class="results-grid">
      ${songs.map((s,i) => `
        <div class="song-card" onclick="playSong(${JSON.stringify(s).replace(/"/g,'&quot;')})" id="card-${s.slug}">
          <div class="card-colors" style="background:${colors[i%colors.length]}"></div>
          <div class="card-thumb">
            <img src="https://img.youtube.com/vi/${s.youtubeId}/mqdefault.jpg" alt="${s.title}" onerror="this.parentElement.style.background='${colors[i%colors.length]}20'" />
          </div>
          <div class="card-body">
            <div class="card-title">${s.title}</div>
            <div class="card-sub">Super Simple Songs</div>
          </div>
        </div>`).join('')}
    </div>`;
}

async function playSong(song) {
  document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-'+song.slug);
  if (card) card.classList.add('active');

  const playerArea = document.getElementById('player-area');
  playerArea.style.display = '';
  playerArea.innerHTML = `
    <div class="player-wrap">
      <div class="video-container">
        <iframe src="https://www.youtube.com/embed/${song.youtubeId}?autoplay=1&rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="player-bar">
        <span class="player-note">🎶</span>
        <div class="player-text">
          <div class="player-title">${song.title}</div>
          <div class="player-meta">Super Simple Songs</div>
        </div>
        <a href="https://supersimple.com/song/${song.slug}/" target="_blank" class="player-open-btn">Visit site</a>
      </div>
    </div>
    <div class="bottom-card">
      <div class="tabs">
        <button class="tab-btn active" id="tab-lyrics" onclick="switchTab('lyrics')"><span class="tab-icon">🎤</span> Lyrics</button>
        <button class="tab-btn" id="tab-info" onclick="switchTab('info')"><span class="tab-icon">⭐</span> Song Info</button>
      </div>
      <div class="tab-content" id="tab-content">
        <div class="lyrics-text loading">Loading lyrics... 🎵</div>
      </div>
    </div>`;

  playerArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const [lyricsRes, infoRes] = await Promise.all([
      fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'Provide the full lyrics for this Super Simple Songs kids song. Only return the lyrics text with line breaks between lines. No title, no preamble.',
          messages: [{ role: 'user', content: `Lyrics for: "${song.title}"` }]
        })
      }),
      fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: 'Short friendly description of this Super Simple Songs song for parents/teachers. What kids learn, age group, tips. 3 sentences max.',
          messages: [{ role: 'user', content: `About the song: "${song.title}"` }]
        })
      })
    ]);

    const lyricsData = await lyricsRes.json();
    const infoData = await infoRes.json();
    const lyrics = lyricsData.content.map(c=>c.text||'').join('').trim();
    const info = infoData.content.map(c=>c.text||'').join('').trim();

    window._songLyrics = lyrics;
    window._songInfo = info;
    switchTab('lyrics');
  } catch(e) {
    document.getElementById('tab-content').innerHTML = '<div class="lyrics-text">Could not load lyrics. Visit supersimple.com! 🎵</div>';
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-lyrics').classList.toggle('active', tab === 'lyrics');
  document.getElementById('tab-info').classList.toggle('active', tab === 'info');

  const content = document.getElementById('tab-content');
  if (tab === 'lyrics') {
    const lines = (window._songLyrics || '').split('\n');
    const html = lines.map(line =>
      line.trim() === '' ? '<span class="lyrics-line"></span>' : `<span class="lyrics-line">${line}</span>`
    ).join('');
    content.innerHTML = `<div class="lyrics-text">${html}</div>`;
  } else {
    content.innerHTML = `
      <div class="info-badge">🌟 Song Info</div>
      <div class="info-text">${window._songInfo || 'Loading info...'}</div>`;
  }
}
</script>
</body>
</html>
